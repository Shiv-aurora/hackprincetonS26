name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            setup.cfg
            setup.py

      - name: Install quality tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff bandit detect-secrets

      - name: Lint Python files
        run: |
          if find . -path ./.venv -prune -o -path ./.git -prune -o -name "*.py" -print -quit | grep -q .; then
            ruff check .
            ruff format --check .
          else
            echo "No Python source files found; skipping ruff."
          fi

      - name: Scan for high-confidence secrets
        run: |
          detect-secrets scan \
            --exclude-files '(^|/)(\.git|\.venv|__pycache__|\.pytest_cache|.*\.egg-info)(/|$)' \
            --exclude-files '.*\.pyc$' \
            --all-files > detect-secrets.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("detect-secrets.json").read_text())
          findings = report.get("results", {})
          if findings:
              print("Potential secrets detected:")
              for file_name, secrets in findings.items():
                  for secret in secrets:
                      print(f"- {file_name}:{secret.get('line_number', '?')} {secret.get('type', 'unknown')}")
              raise SystemExit(1)

          print("No potential secrets detected.")
          PY

      - name: Run static security analysis
        run: |
          if find . -path ./.venv -prune -o -path ./.git -prune -o -name "*.py" -print -quit | grep -q .; then
            bandit -r src tests -x "*/__pycache__/*" --severity-level medium
          else
            echo "No Python source files found; skipping bandit."
          fi

  test:
    name: Tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            setup.cfg
            setup.py

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            python -m pip install -e ".[dev]"
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            echo "No packaging metadata found; using PYTHONPATH=src for tests."
          fi

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          if find tests -name "test_*.py" -print -quit | grep -q .; then
            pytest --cov=src --cov-report=term-missing --cov-report=xml
          else
            echo "No pytest tests found; skipping test execution."
          fi

      - name: Upload coverage report
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            setup.cfg
            setup.py

      - name: Build distributable artifacts
        run: |
          python -m pip install --upgrade pip build twine
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            python -m build
            python -m twine check dist/*
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "Package metadata is required before publishing a release tag."
            exit 1
          else
            echo "No packaging metadata found; creating a source snapshot artifact instead."
            mkdir -p dist
            git archive --format=tar.gz --output=dist/source-snapshot.tar.gz HEAD
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            setup.cfg
            setup.py

      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip pip-audit
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            python -m pip install -e .
            pip-audit
          elif [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "No dependency manifest found; skipping dependency audit."
          fi

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build
      - dependency-audit
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://pypi.org/project/ngsp-clinical/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Publish package to PyPI
        if: hashFiles('dist/*.whl', 'dist/*.tar.gz') != ''
        uses: pypa/gh-action-pypi-publish@release/v1

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
