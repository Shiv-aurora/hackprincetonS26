name: Tier 1 CI

on:
  push:
  pull_request:
    branches:
      - main
      - research

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHON_VERSION: "3.10"

jobs:
  smoke:
    name: smoke
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Collect pytest tests
        run: python -m pytest --collect-only -q

      - name: Scan tracked files for committed secrets
        shell: bash
        run: |
          set -euo pipefail
          pattern='sk-ant-[a-zA-Z0-9]{20}|hf_[a-zA-Z0-9]{30}|sk-proj-[a-zA-Z0-9]{20}|AKIA[A-Z0-9]{16}'
          found=0
          while IFS= read -r -d '' file; do
            if [ "$file" = ".env.example" ]; then
              continue
            fi
            if grep -nIE "$pattern" "$file"; then
              echo "SECRET PATTERN FOUND: $file"
              found=1
            fi
          done < <(git ls-files -z)
          if [ "$found" -ne 0 ]; then
            exit 1
          fi

      - name: Check tracked file sizes
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            size=$(wc -c < "$file")
            if [ "$size" -ge 10485760 ]; then
              echo "TOO BIG: $file"
              exit 1
            fi
          done < <(git ls-files -z)

  full:
    name: full
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Collect pytest tests
        run: python -m pytest --collect-only -q

      - name: Scan tracked files for committed secrets
        shell: bash
        run: |
          set -euo pipefail
          pattern='sk-ant-[a-zA-Z0-9]{20}|hf_[a-zA-Z0-9]{30}|sk-proj-[a-zA-Z0-9]{20}|AKIA[A-Z0-9]{16}'
          found=0
          while IFS= read -r -d '' file; do
            if [ "$file" = ".env.example" ]; then
              continue
            fi
            if grep -nIE "$pattern" "$file"; then
              echo "SECRET PATTERN FOUND: $file"
              found=1
            fi
          done < <(git ls-files -z)
          if [ "$found" -ne 0 ]; then
            exit 1
          fi

      - name: Check tracked file sizes
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            size=$(wc -c < "$file")
            if [ "$size" -ge 10485760 ]; then
              echo "TOO BIG: $file"
              exit 1
            fi
          done < <(git ls-files -z)

      - name: Run pytest
        run: python -m pytest -q --tb=short

      - name: Find changed Python files
        id: changed-python
        shell: bash
        run: |
          set -euo pipefail
          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          python_files=$(git diff --name-only --diff-filter=ACMR "$base_ref"...HEAD -- '*.py' | tr '\n' ' ')
          echo "files=$python_files" >> "$GITHUB_OUTPUT"
          if [ -n "$python_files" ]; then
            echo "Changed Python files: $python_files"
          else
            echo "No changed Python files."
          fi

      - name: Run targeted ruff checks on changed files
        if: steps.changed-python.outputs.files != ''
        run: ruff check --select F401,F841,F811,E9 ${{ steps.changed-python.outputs.files }}

      - name: Check formatting on changed files
        if: steps.changed-python.outputs.files != ''
        run: ruff format --check ${{ steps.changed-python.outputs.files }}

      - name: Check collected test count baseline
        shell: bash
        run: |
          set -euo pipefail
          baseline=$(tr -d '[:space:]' < .github/test-baseline.txt)
          current=$(python -m pytest --collect-only -q 2>&1 | awk -F': ' '/: [0-9]+$/ {sum += $2} END {print sum + 0}')
          echo "Baseline tests: $baseline"
          echo "Current tests:  $current"
          if [ "$current" -lt "$baseline" ]; then
            echo "Collected test count regressed."
            exit 1
          fi

  pr-info:
    name: pr-info
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Post sticky PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-pr-info -->';
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const changedFiles = files.length;
            const additions = files.reduce((sum, file) => sum + file.additions, 0);
            const deletions = files.reduce((sum, file) => sum + file.deletions, 0);
            const directories = [...new Set(files.map((file) => {
              const parts = file.filename.split('/');
              return parts.length > 1 ? `${parts.slice(0, -1).join('/')}/` : './';
            }))].sort();

            const body = `${marker}
            **CI PR Info**

            - Files changed: ${changedFiles}
            - Lines added: ${additions}
            - Lines removed: ${deletions}
            - Directories touched:
            ${directories.map((dir) => `  - \`${dir}\``).join('\n')}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body,
              });
            }
